<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#00535b" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1414" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Coordene o cuidado do seu familiar em equipe." />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <title>CuidaJunto</title>
    <script>
      // Apply the saved theme before first paint to avoid a light/dark flash.
      // Kept inline and tiny on purpose; the React hook takes over after mount.
      ;(function () {
        try {
          var pref = localStorage.getItem('cuidajunto.theme')
          var dark =
            pref === 'dark' ||
            ((pref === null || pref === 'system') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {
          /* first paint falls back to light */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
